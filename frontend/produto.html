<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Análise do Produto</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="hero hero-small">
      <div class="container">
        <p class="eyebrow">Review completa</p>
        <h1 id="produto-titulo">Carregando...</h1>
      </div>
    </header>

    <main class="container">
      <section class="section single-product" id="produto-detalhes">
        <div class="product-card">
          <div class="product-copy">
            <p id="produto-categoria" class="eyebrow"></p>
            <h2 id="produto-nome">Carregando...</h2>
            <p id="produto-avaliacao" class="text-link"></p>
            <p id="produto-veredito" class="text-link"></p>
            <p id="produto-descricao"></p>
            <ul id="produto-pontos"></ul>
            <a id="produto-link" class="btn btn-primary" href="#">Ver preço na Amazon</a>
            <a class="text-link" href="index.html">Voltar para a home</a>
          </div>
          <div class="product-visual">
            <img id="produto-imagem" src="" alt="Capa do produto" style="max-width: 100%; max-height: 220px; border-radius: 12px; object-fit: cover;" />
          </div>
        </div>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        renderProduto(id);
      });
    </script>
  </body>
</html>
